name: Basic Checkout Actions 

on: 
  push: 
    branches: 
      - main 


jobs: 
  basic-checkout: 
    runs-on: ubuntu-latest
    env:
        CUSTOM_MESSAGE: "Hello from GitHub Actions!"
    steps: 
      # check the respository   
      - name: Checkout respository 
        uses: actions/checkout@v4 
      # list files 
      - name: List Files 
        run: ls -la 
      # check system info 
      - name: Check System Info 
        run: | 
          echo "Repository: $GITHUB_REPOSITORY"  
          echo "Operating System: $(uname -a)" 
          echo "Current Working Directory: $(pwd)"
      # check software version 
      - name: Check software version 
        run: | 
          echo "node version: $(node --version)" 
          echo "python version: $(python --version)" 
          echo "git version: $(git --version)"  
      - name: Current Date and time 
        run: date 
      - name: Available Disk Space 
        run: df -h 
      - name: Current space 
        run: free -m 
      - name: Conditional step
        if: github.event_name == 'push'
        run: echo "This was triggered by a push event"
      
      - name: Display custom message
        run: echo "$CUSTOM_MESSAGE"
      


       
     
